name: CI

on:
  push:
    branches: [main]
  pull_request:

# Fork-safe: pull_request (not pull_request_target), no secrets used.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  local-hapi:
    name: Local scripted HAPI quickstart
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FHIR_BACKEND: hapi
      FHIR_BASE_URL: http://localhost:8080/fhir
      AI_PROVIDER: scripted
      LASTEHR_SCRIPTED_DEMO: "true"
      NEXT_PUBLIC_QUICKSTART: "true"
      NEXT_PUBLIC_SCRIPTED_DEMO: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - run: npm ci
      - name: Prepare the zero-key local demo
        run: npm run demo:local:prepare
      - name: Verify seeded patient search
        run: >-
          curl --fail --silent --show-error
          'http://localhost:8080/fhir/Patient?name=Smith&_count=20'
          | jq -e '([.entry[]?.resource | select(.resourceType == "Patient")] | length) >= 2'
      - name: Verify zero-credential HAPI MCP Local Lab
        env:
          RUN_HAPI_E2E: "1"
        run: npm test -- scripts/mcp-demo.hapi.integration.test.ts
      - name: Run FHIR Agent Safety Eval
        run: >-
          npm run eval -- --no-prepare
          --report artifacts/fhir-agent-safety-eval.json
      - name: Upload FHIR Agent Safety Eval report
        uses: actions/upload-artifact@v4
        with:
          name: fhir-agent-safety-eval
          path: artifacts/fhir-agent-safety-eval.json
          if-no-files-found: error
      - name: Verify scripted approval flow against HAPI
        env:
          RUN_HAPI_E2E: "1"
        run: >-
          npm test --
          lib/fhir/hapi.contract.integration.test.ts
          lib/ai/scripted-demo.hapi.integration.test.ts
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run browser approval-flow e2e
        env:
          RATE_LIMIT_PER_IP_MAX: "100"
        run: npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
      - name: Show local stack logs on failure
        if: failure()
        run: docker compose logs --no-color hapi postgres
      - name: Stop local FHIR stack
        if: always()
        run: docker compose down --volumes --remove-orphans
