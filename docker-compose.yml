services:
  hapi:
    image: hapiproject/hapi:v8.10.0-2
    ports:
      # HAPI has no authentication in this synthetic evaluation stack. Keep
      # the host port private; other Compose services still use hapi:8080.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./docker/hapi.application.yaml:/app/config/application.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: hapi
    volumes:
      - hapi-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  hapi-postgres:
